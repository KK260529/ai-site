<article class="course-page glass">
  {{breadcrumb}}
  <header>
    <p class="course-page__meta">{{topic}} · 対象: {{target}} · 全{{episodeCount}}回（{{publishedCount}}記事公開中）</p>
    <h1>{{title}}</h1>
    <p>{{description}}</p>
  </header>
  {{adTop}}
  <section>
    <h2>エピソード一覧</h2>
    <ol class="episode-list">{{episodeList}}</ol>
  </section>
  {{adMid}}
  <p><a href="/knowledge/{{topic}}" class="btn btn--ghost">← ナレッジに戻る</a></p>
  {{adBottom}}
</article>
