<article class="article-page glass">
  {{breadcrumb}}
  <header class="article-page__head">
    <span class="article-page__category">{{category}}</span>
    <h1 class="article-page__title">{{title}}</h1>
    <p class="article-page__summary">{{summary}}</p>
    <div class="article-page__meta">
      <time>{{date}}</time>
      <div class="article-page__tags">{{tags}}</div>
    </div>
  </header>
  {{adTop}}
  <div class="article-page__body prose">{{body}}</div>
  <section class="article-page__conclusion">
    <h2>まとめ</h2>
    <p>{{conclusion}}</p>
  </section>
  {{faq}}
  {{seriesNav}}
  {{relatedArticles}}
  {{adBottom}}
</article>
