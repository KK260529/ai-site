<section class="hero">
  <h1 class="hero__title">{{heroTitle}}</h1>
  <p class="hero__sub">{{siteTagline}}</p>
  <p class="hero__count"><span id="articleCount">{{articleCount}}</span> 件の公開記事 · <a href="/articles" class="hero__link">全記事を見る</a> · <a href="/topics" class="hero__link">講座一覧</a></p>
</section>

{{adAfterHero}}

<section class="section-block">
  <h2 class="section-block__title">おすすめ学習パス</h2>
  <div class="learning-paths">{{learningPaths}}</div>
</section>

<section class="section-block">
  <h2 class="section-block__title">講座</h2>
  <div class="cards cards--courses">{{courseCards}}</div>
  <p class="section-block__more"><a href="/topics">すべての講座を見る →</a></p>
</section>

{{adBetweenSections}}

<section class="section-block">
  <h2 class="section-block__title">人気タグ</h2>
  <div class="tag-cloud">{{tagCloud}}</div>
</section>

<section class="filters glass">
  <form class="filters__search" id="homeSearchForm" action="/search" method="get">
    <input type="search" name="q" id="searchInput" class="input" placeholder="記事を検索…" aria-label="検索">
    <button type="submit" class="btn btn--primary">検索</button>
  </form>
  <div class="filters__row">
    <select id="categoryFilter" class="select" aria-label="カテゴリ">
      <option value="">すべてのカテゴリ</option>
      {{categoryOptions}}
    </select>
    <button type="button" class="btn btn--ghost" id="clearFilters">クリア</button>
  </div>
</section>

<section class="section-block">
  <h2 class="section-block__title">記事</h2>
  {{adBeforeArticles}}
  <section class="cards" id="articleGrid">{{articleCards}}</section>
</section>
