<article class="error-page glass">
  <h1 class="error-page__code">404</h1>
  <p class="error-page__msg">お探しのページが見つかりませんでした。</p>
  <p class="error-page__hint">URLが間違っているか、ページが移動した可能性があります。</p>
  <div class="error-page__actions">
    <a href="/" class="btn btn--primary">ホームへ</a>
    <a href="/topics" class="btn btn--ghost">講座一覧</a>
    <a href="/articles" class="btn btn--ghost">全記事</a>
  </div>
  <section class="error-page__section">
    <h2>人気の講座</h2>
    <div class="topic-pills">{{topicLinks}}</div>
  </section>
  <section class="error-page__section">
    <h2>新着記事</h2>
    <ul class="error-page__list">{{recentArticles}}</ul>
  </section>
  <form class="error-page__search" action="/search" method="get">
    <input type="search" name="q" class="input" placeholder="キーワードで記事を検索…" aria-label="検索">
    <button type="submit" class="btn btn--primary">検索</button>
  </form>
</article>
